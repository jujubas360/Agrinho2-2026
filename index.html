<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberDuck Tamagotchi 2000</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="wii-music.mp3" type="audio/mpeg">
    </audio>

    <div class="cyber-container">
        <h1 class="neon-text-green">CYBER-DUCK v1.0</h1>
        
        <div class="tamagotchi-case">
            <div class="case-horn left"></div>
            <div class="case-horn right"></div>
            
            <div class="screen-border">
                <div class="screen" id="game-screen">
                    
                    <div class="status-bar">
                        <span id="status-text">FELIZ</span>
                    </div>

                    <div class="pet-container">
                        <div class="cyber-pet" id="pet">
                            <div class="pet-horn-left"></div>
                            <div class="pet-horn-right"></div>
                            <div class="pet-body">
                                <div class="pet-eye"></div>
                                <div class="pet-beak"></div>
                            </div>
                        </div>
                    </div>

                    <div class="stats-display">
                        <div>FOME: <span id="stat-hunger">0</span>%</div>
                        <div>TÉDIO: <span id="stat-boredom">0</span>%</div>
                    </div>
                </div>
            </div>

            <div class="buttons-container">
                <button class="tamo-btn" id="btn-feed" title="Alimentar">A</button>
                <button class="tamo-btn" id="btn-play" title="Brincar">B</button>
                <button class="tamo-btn" id="btn-reset" title="Reiniciar">C</button>
            </div>
            <div class="button-labels">
                <span>FEED</span>
                <span>PLAY</span>
                <span>RESET</span>
            </div>
        </div>
        
        <p class="instruction">CLIQUE EM QUALQUER LUGAR PARA LIGAR O SOM (WII MUSIC)</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
